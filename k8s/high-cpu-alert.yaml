apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule

metadata:
  name: payment-api-alerts
  namespace: monitoring

spec:
  groups:

  - name: payment-api

    rules:

    - alert: HighCPUUsage

      expr: |
        sum(
          rate(
            container_cpu_usage_seconds_total{
              namespace="ai-sre"
            }[2m]
          )
        ) > 0.1

      for: 1m

      labels:
        severity: warning

      annotations:

        summary: High CPU usage detected

        description: CPU utilization exceeded threshold.